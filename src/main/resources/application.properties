spring.application.name=dragons-vs-ravens
server.port=${PORT:8080}
server.forward-headers-strategy=framework
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./build/db/dragons-vs-ravens;MODE=PostgreSQL;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
dragons-vs-ravens.games.stale-threshold=1008h
# Optional Google OAuth login.
# Define these environment variables to enable the Google sign-in button:
# SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID
# SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET
# SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_SCOPE=openid,profile,email
